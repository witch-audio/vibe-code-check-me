<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>VibeCodeCheck</title>
    <link rel="icon" type="image/png" href="/computer-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">

      <!-- ============ VIBE CHECK SCREEN ============ -->
      <div id="vibe-check" class="screen">
      </div>

      <!-- ============ LANDING SCREEN ============ -->
      <div id="landing" class="screen">
        <div class="landing-bg">
          <div class="checker-pattern"></div>
          <div class="landing-gradient"></div>
        </div>
        <div class="landing-content">
          <div class="landing-badge">DEV WRAPPED</div>
          <h1 class="landing-title">
            <span class="title-line">DEV</span>
            <span class="title-line accent">WRAPPED</span>
          </h1>
          <p class="landing-sub">Discover your coding personality.<br>See your code like never before.</p>
          <div class="landing-input-group">
            <div class="input-wrapper">
              <svg class="gh-icon" viewBox="0 0 16 16" width="20" height="20" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
              <input
                type="text"
                id="username-input"
                placeholder="Enter GitHub username"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <button id="connect-btn" class="pill-btn">Let's go</button>
          </div>
          <p id="landing-error" class="landing-error"></p>

          <div class="landing-footer">
            <span>vibecodecheck.me</span>
            <span>·</span>
            <span>by <a href="https://twitter.com/witchaudio_" target="_blank" rel="noopener noreferrer">@witchaudio_</a></span>
          </div>
        </div>
      </div>

      <!-- ============ LOADING SCREEN ============ -->
      <div id="loading-screen" class="screen">
        <div class="loading-content">
          <div class="loading-ring">
            <div class="ring-segment"></div>
            <div class="ring-segment"></div>
            <div class="ring-segment"></div>
          </div>
          <p class="loading-text" id="loading-text">Analyzing your code...</p>
          <p class="loading-sub">Scanning repos, commits, and vibes</p>
        </div>
      </div>

      <!-- ============ STORIES SCREEN ============ -->
      <div id="stories" class="screen">
        <div class="story-progress" id="story-progress">
          <!-- Progress bars generated dynamically -->
        </div>
        <div class="story-header">
          <button class="story-close" id="story-close">&times;</button>
          <span class="story-brand">VIBE CODE CHECK</span>
          <button class="story-share" id="story-share-btn">Share</button>
        </div>
        <div class="story-cards" id="story-cards">
          <!-- Cards rendered dynamically -->
        </div>
        <div class="story-footer">
          <span class="story-counter" id="story-counter">1 / 6</span>
        </div>
      </div>

    </div>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
